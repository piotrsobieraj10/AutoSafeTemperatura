name: Zbuduj pakiet APK AutoSafe Temperatura na Androida

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PORT: 3000
  BASE_PATH: /

jobs:
  build-android-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        working-directory: artifacts/autosafe
        run: pnpm run build
        env:
          PORT: 3000
          BASE_PATH: /

      - name: Sync Capacitor Android
        working-directory: artifacts/autosafe
        run: pnpm exec cap sync android
        env:
          PORT: 3000
          BASE_PATH: /

      - name: Make Gradle executable
        working-directory: artifacts/autosafe/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: artifacts/autosafe/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSafe_Temperatura_v6_debug_apk
          path: artifacts/autosafe/android/app/build/outputs/apk/debug/app-debug.apk
